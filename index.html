<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#06060f;--bg2:#0a0a1a;--bg3:#0e0e22;--border:rgba(255,255,255,0.06);
  --pink:#ff2d78;--pink-dim:rgba(255,45,120,0.15);--pink-glow:rgba(255,45,120,0.4);
  --blue:#00d4ff;--blue-dim:rgba(0,212,255,0.12);--blue-glow:rgba(0,212,255,0.4);
  --purple:#b44dff;--purple-dim:rgba(180,77,255,0.12);
  --yellow:#ffe66d;--green:#39ff8e;--red:#ff4566;--cyan:#00ffe5;
  --muted:#3a3a5c;--dim:#1e1e38;--text:#d0d8f0;--text2:#6e7a9e;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:13px;line-height:1.6;overflow:hidden}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,20,0.04) 2px,rgba(0,0,20,0.04) 4px);pointer-events:none;z-index:9999;animation:scanmove 8s linear infinite}
@keyframes scanmove{0%{background-position:0 0}100%{background-position:0 100%}}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at center,transparent 60%,rgba(0,0,10,0.7) 100%);pointer-events:none;z-index:9998}
#boot{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:1000;transition:opacity 0.8s ease}
.boot-logo{font-size:clamp(2rem,5vw,3.5rem);font-weight:700;letter-spacing:-0.02em;margin-bottom:0.5rem}
.boot-logo-av{color:var(--blue);text-shadow:0 0 30px var(--blue-glow),0 0 60px rgba(0,212,255,0.2)}
.boot-logo-yash{color:var(--pink);text-shadow:0 0 30px var(--pink-glow),0 0 60px rgba(255,45,120,0.2)}
.boot-sub{font-size:11px;color:var(--muted);letter-spacing:0.35em;text-transform:uppercase;margin-bottom:3rem}
.boot-progress-wrap{width:min(420px,80vw);height:1px;background:var(--dim);position:relative;overflow:visible;margin-bottom:1rem}
.boot-progress-bar{height:100%;background:linear-gradient(90deg,var(--blue),var(--pink));width:0%;transition:width 0.15s linear;box-shadow:0 0 12px var(--blue-glow),0 0 24px var(--pink-glow);position:relative}
.boot-progress-bar::after{content:'';position:absolute;right:0;top:-2px;width:4px;height:5px;background:#fff;border-radius:2px;box-shadow:0 0 8px #fff}
.boot-status{font-size:11px;color:var(--text2);text-align:center;min-height:1.4em;letter-spacing:0.05em}
.boot-log{margin-top:1.5rem;width:min(420px,80vw);max-height:100px;overflow:hidden}
.boot-log-line{font-size:10px;color:var(--muted);margin-bottom:1px}
#shell{height:100vh;display:flex;flex-direction:column;opacity:0;transition:opacity 0.6s ease}
.title-bar{background:var(--bg3);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0.55rem 1rem;gap:0.75rem;flex-shrink:0;position:relative;overflow:hidden}
.title-bar::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--blue),var(--pink),transparent);opacity:0.6}
.tb-dots{display:flex;gap:6px}
.tb-dot{width:12px;height:12px;border-radius:50%;cursor:pointer;transition:filter 0.2s}

.tb-title{flex:1;text-align:center;font-size:11px;color:var(--muted);letter-spacing:0.1em}

#output{flex:1;overflow-y:auto;padding:1.5rem 2rem;scroll-behavior:smooth}

.prompt-colon{color:var(--muted)}.prompt-path{color:var(--purple)}.prompt-dollar{color:var(--pink);margin-left:0.25rem}

.rm-tag-bl{color:var(--blue);border-color:rgba(0,212,255,0.35);background:rgba(0,212,255,0.08)}

.rm-tag-re{color:var(--red);border-color:rgba(255,69,102,0.35);background:rgba(255,69,102,0.08)}

.rm-kv{display:flex;gap:0.5rem;margin-bottom:0.25rem}

.rm-cmd{display:inline-block;color:var(--green);background:rgba(57,255,142,0.07);border:1px solid rgba(57,255,142,0.2);padding:0.1rem 0.45rem;font-size:11px;margin:0.1rem 0}
.rm-finding{border-left:2px solid;padding:0.5rem 0.75rem;margin:0.5rem 0;font-size:11px}

.rm-finding-title{font-weight:700;display:block;margin-bottom:0.2rem}
.rm-finding-crit .rm-finding-title{color:var(--red)}
.rm-finding-high .rm-finding-title{color:var(--pink)}
.rm-finding-med .rm-finding-title{color:var(--yellow)}
.rm-finding-info .rm-finding-title{color:var(--blue)}
.readme-footer{padding:0.8rem 1.2rem;border-top:1px solid var(--border);flex-shrink:0;background:var(--bg3)}
.rm-footer-hint{font-size:10px;color:var(--muted);letter-spacing:0.05em}
.tb-readme-btn{font-size:10px;color:var(--purple);border:1px solid rgba(180,77,255,0.35);padding:0.2rem 0.65rem;cursor:pointer;letter-spacing:0.08em;transition:all 0.2s;background:none;font-family:"JetBrains Mono",monospace}
.tb-readme-btn:hover,.tb-readme-btn.active{color:var(--pink);border-color:rgba(255,45,120,0.5);background:rgba(255,45,120,0.06)}
#readme-overlay{position:fixed;inset:0;background:rgba(0,0,10,0.45);z-index:499;opacity:0;pointer-events:none;transition:opacity 0.35s ease}
#readme-overlay.open{opacity:1;pointer-events:all}
.line{display:block;margin-bottom:1px}

.lp-user{color:var(--pink);font-weight:700;text-shadow:0 0 8px var(--pink-glow)}
.lp-at{color:var(--muted)}.lp-host{color:var(--blue);text-shadow:0 0 6px var(--blue-glow)}
.lp-colon{color:var(--muted)}.lp-path{color:var(--purple)}.lp-dollar{color:var(--pink);margin-right:0.5rem}

.out-gr{color:var(--green)}.out-re{color:var(--red)}.out-mu{color:var(--muted)}
.out-di{color:var(--dim)}.out-tx{color:var(--text)}.out-t2{color:var(--text2)}
.file-entry{display:inline-block;margin-right:1.5rem;margin-bottom:4px}
.fe-dir{color:var(--blue);font-weight:700;text-shadow:0 0 6px var(--blue-glow)}

.scan-fill{height:100%;border-radius:1px;transition:width 0.6s cubic-bezier(.4,0,.2,1)}
.help-row{display:grid;grid-template-columns:190px 1fr;gap:0.75rem;margin-bottom:3px}

#matrix-canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1;opacity:0.04}
@keyframes fadeSlide{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:none}}
.out,.line,.blank{animation:fadeSlide 0.1s ease forwards}
</style>
</head>
<body>

<div id="boot">
  <div class="boot-logo"><span class="boot-logo-av">AVY</span><span class="boot-logo-yash">ASH</span><span style="color:var(--muted)">.SH</span></div>

<script>
(function(){
  const c=document.getElementById('matrix-canvas');
  const ctx=c.getContext('2d');
  let cols,drops;
  function resize(){c.width=window.innerWidth;c.height=window.innerHeight;cols=Math.floor(c.width/16);drops=Array(cols).fill(1)}
  resize();window.addEventListener('resize',resize);
  const chars='アイウエオカキクケコ01アBCDEF!@#$%^&*<>?/\\|{}[]';
  setInterval(()=>{
    ctx.fillStyle='rgba(6,6,15,0.05)';ctx.fillRect(0,0,c.width,c.height);
    ctx.font='12px JetBrains Mono,monospace';
    drops.forEach((y,i)=>{
      const ch=chars[Math.floor(Math.random()*chars.length)];
      ctx.fillStyle=Math.random()>0.9?'rgba(255,45,120,0.8)':'rgba(0,212,255,0.5)';
      ctx.fillText(ch,i*16,y*16);
      if(y*16>c.height&&Math.random()>0.975)drops[i]=0;
      drops[i]++;
    });
  },60);
})();

const FS={

let cwd='~';
let hist=[],histIdx=-1;
const out=document.getElementById('output');
const inp=document.getElementById('cmd-input');
const promptPath=document.getElementById('prompt-path');

const bootMsgs=[
  {s:'[  0.001 ] Loading kernel modules...',c:'out-mu'},
  {s:'[  0.018 ] Mounting encrypted filesystem...',c:'out-mu'},
  {s:'[  0.034 ] Initializing network interfaces...',c:'out-mu'},
  {s:'[  0.102 ] Starting Burp Suite Pro daemon...',c:'out-bl'},
  {s:'[  0.158 ] Loading recon modules: amass subfinder nuclei...',c:'out-bl'},
  {s:'[  0.201 ] Connecting to YesWeHack API...',c:'out-pk'},
  {s:'[  0.247 ] Connecting to Bugcrowd...',c:'out-pk'},
  {s:'[  0.312 ] Loading exploit database (CVE-2025-*)...',c:'out-ye'},
  {s:'[  0.388 ] Configuring VPN tunnel...',c:'out-mu'},
  {s:'[  0.441 ] Importing custom wordlists...',c:'out-bl'},
  {s:'[  0.509 ] Checking active sessions...',c:'out-mu'},
  {s:'[  OK  ] Shell environment ready.',c:'out-gr'},
];
let bStep=0;
const bBar=document.getElementById('boot-bar');
const bStatus=document.getElementById('boot-status');
const bLog=document.getElementById('boot-log');
const bootEl=document.getElementById('boot');
const shellEl=document.getElementById('shell');

function runBoot(){
  if(bStep>=bootMsgs.length){
    bBar.style.width='100%';
    setTimeout(()=>{
      bootEl.style.opacity='0';shellEl.style.opacity='1';
      setTimeout(()=>{bootEl.style.display='none';printWelcome();inp.focus()},600);
    },500);return;
  }
  const m=bootMsgs[bStep];
  bStatus.textContent=m.s;
  bBar.style.width=((bStep+1)/bootMsgs.length*100)+'%';
  const li=document.createElement('div');
  li.className='boot-log-line '+m.c;
  li.textContent=m.s;
  bLog.appendChild(li);
  bLog.scrollTop=bLog.scrollHeight;
  bStep++;
  setTimeout(runBoot,140+Math.random()*120);
}
setTimeout(runBoot,600);

function printWelcome(){
  // Glitch-typed name effect
  function glitchType(el, finalText, color, duration, cb){
    const chars='@#$%&!?<>/\\[]{}|^~*';
    let frame=0; const total=Math.floor(duration/40);
    const iv=setInterval(()=>{
      frame++;
      const progress=frame/total;
      const revealed=Math.floor(progress*finalText.length);
      let display='';
      for(let i=0;i<finalText.length;i++){
        if(i<revealed) display+=finalText[i];
        else if(i===revealed) display+='<span style="color:'+color+';opacity:0.7">'+chars[Math.floor(Math.random()*chars.length)]+'</span>';
        else display+='<span style="opacity:0.15">'+chars[Math.floor(Math.random()*chars.length)]+'</span>';
      }
      el.innerHTML=display;
      if(frame>=total){clearInterval(iv);el.innerHTML='<span style="color:'+color+';text-shadow:0 0 20px '+color+'80">'+finalText+'</span>';if(cb)cb();}
    },40);
  }

  // BIG ASCII art banner — rendered line by line
  const banner=[
    '',
    '    ░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░',
    '    ░                                                             ░',
    '    ░   █████╗ ██╗   ██╗██╗   ██╗ █████╗ ███████╗██╗  ██╗      ░',

function resolvePath(arg){
  if(!arg||arg==='~')return '~';
  if(arg==='..')return cwd==='~'?'~':cwd.split('/').slice(0,-1).join('/')||'~';
  if(arg.startsWith('~/'))return arg;
  if(cwd==='~')return '~/'+arg;
  return cwd+'/'+arg;
}

ls(args){
  const target=args[0]?resolvePath(args[0]):cwd;
  const node=FS[target];
  if(!node){row('out-re',"  ls: cannot access '"+args[0]+"': No such file or directory");return;}
  if(node.type==='file'){row('out-tx','  '+target.split('/').pop());return;}
  b();
  row('out-bl','  '+target+'/');
  b();
  const wrap=document.createElement('div');
  wrap.style.cssText='padding-left:2rem;line-height:2.2';
  node.children.forEach(name=>{
    const fp=target==='~'?'~/'+name:target+'/'+name;
    const child=FS[fp];
    const isDir=child&&child.type==='dir';
    const ext=name.split('.').pop();
    const sp=document.createElement('span');
    sp.className='file-entry';
    let cls='fe-txt',icon='[f] ';
    if(isDir){cls='fe-dir';icon='[d] ';}
    else if(ext==='sh'||ext==='py'){cls='fe-sh';icon='[x] ';}
    else if(ext==='cert'){cls='fe-cert';icon='[c] ';}
    else if(ext==='md'){cls='fe-md';icon='[m] ';}
    sp.innerHTML='<span class="'+cls+'">'+icon+esc(name)+(isDir?'/':'')+'</span>';
    wrap.appendChild(sp);
  });
  out.appendChild(wrap);
  b();
},

cd(args){
  const target=resolvePath(args[0]||'~');
  const node=FS[target];
  if(!node){row('out-re','  cd: '+args[0]+': No such file or directory');return;}
  if(node.type==='file'){row('out-re','  cd: '+args[0]+': Not a directory');return;}
  cwd=target;promptPath.textContent=cwd;
  CMD.ls([]);

function toggleReadme(){
  const panel=document.getElementById('readme-panel');
  const overlay=document.getElementById('readme-overlay');
  const btn=document.getElementById('readme-btn');
  const isOpen=panel.classList.contains('open');
  if(!isOpen){
    buildReadme();
    panel.classList.add('open');
    overlay.classList.add('open');
    btn.classList.add('active');
    btn.textContent='&#x2715; close';
  } else {
    panel.classList.remove('open');
    overlay.classList.remove('open');
    btn.classList.remove('active');
    btn.textContent='README.md';
  }
}

function completions(){
  const node=FS[cwd];
  const children=node?node.children:[];
  return [...Object.keys(CMD),'help','clear','pwd',...children];
}

inp.addEventListener('keydown',e=>{
  if(e.key==='Enter'){
    const raw=inp.value.trim();inp.value='';if(!raw)return;
    hist.unshift(raw);histIdx=-1;
    printPromptLine(raw);exec(raw);scrollBot();
  }else if(e.key==='ArrowUp'){
    e.preventDefault();
    if(histIdx<hist.length-1){histIdx++;inp.value=hist[histIdx];}
  }else if(e.key==='ArrowDown'){
    e.preventDefault();
    if(histIdx>0){histIdx--;inp.value=hist[histIdx];}else{histIdx=-1;inp.value='';}
  }else if(e.key==='Tab'){
    e.preventDefault();
    const parts=inp.value.split(' ');const last=parts[parts.length-1];
    const hits=completions().filter(c=>c.startsWith(last));
    if(hits.length===1){parts[parts.length-1]=hits[0];inp.value=parts.join(' ');}
    else if(hits.length>1){b();row('out-t2','  '+hits.join('   '));scrollBot();}
  }else if(e.ctrlKey&&e.key==='l'){e.preventDefault();CMD.clear();}
  else if(e.ctrlKey&&e.key==='c'){
    inp.value='';
    const el=document.createElement('div');el.className='line-prompt';
    el.innerHTML='<span class="lp-user">avyash</span><span class="lp-at">@</span><span class="lp-host">pentest</span><span class="lp-colon">:</span><span class="lp-path">'+esc(cwd)+'</span><span class="lp-dollar"> $ </span><span class="lp-cmd">^C</span>';
    out.appendChild(el);scrollBot();
  }
});
document.addEventListener('click',()=>inp.focus());
document.addEventListener('keydown',e=>{if(document.activeElement!==inp&&e.key.length===1&&!e.ctrlKey&&!e.metaKey)inp.focus();});

function exec(raw){
  const parts=raw.trim().split(/\s+/);
  const cmd=parts[0].toLowerCase();
  const args=parts.slice(1);
  // Easter egg: sudo hire avyash
  if(cmd==='sudo'&&args[0]==='hire'&&args[1]==='avyash'){
    b();
    row('out-gr','  [sudo] Verifying credentials...');
    setTimeout(()=>{
      row('out-gr','  [sudo] Access granted.');
      b();
      const el=document.createElement('span');el.className='out';
      el.innerHTML='  <span style="color:var(--green);font-weight:700;font-size:14px;text-shadow:0 0 20px var(--green)">HIRE REQUEST APPROVED.</span>  <span style="color:var(--text2)">Redirecting to contact...</span>';
      out.appendChild(el);
      b();
      setTimeout(()=>{CMD.contact();scrollBot();},800);
    },1200);
    scrollBot();return;
  }
  if(CMD[cmd])CMD[cmd](args);
  else{row('out-re','  bash: '+esc(cmd)+': command not found');row('out-t2','  Type  help  for available commands.');}
  scrollBot();
}
